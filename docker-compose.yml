services:
  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - DATABASE_URL=sqlite:///./store_intelligence.db
      - ENV=dev
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=
      - APP_PUBLIC_BASE_URL=http://localhost:8000
      - RATE_LIMIT_PER_MINUTE=0
      - RATE_LIMIT_WINDOW_SECONDS=60
      - MAX_INGEST_BATCH=500
      - MAX_REQUEST_BODY_BYTES=5242880
      - ENABLE_HSTS=0
      - PORT=8000
    restart: always
