[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["docs", "dist", "build", ".venv", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.format]
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
show_error_codes = true
check_untyped_defs = true
no_implicit_optional = true
files = ["app", "pipeline", "tests"]
explicit_package_bases = true

[[tool.mypy.overrides]]
module = [
    "app.database",
    "app.metrics",
    "app.heatmap",
    "app.funnel",
    "app.main",
    "pipeline.adaptive_models",
    "pipeline.calibrate",
    "pipeline.detect"
]
ignore_errors = true

[tool.pytest.ini_options]
addopts = "-v --tb=short --cov=app --cov=pipeline --cov-report=term-missing --cov-report=xml --cov-fail-under=55"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["app", "pipeline"]

[tool.coverage.report]
show_missing = true
skip_covered = true
